# Updated: 2026-05-05 18:37 EDT — adds /api/projects proxy routes
# Resolver is injected at startup by entrypoint.sh (reads from /etc/resolv.conf).
# Railway's *.railway.internal hostnames are ONLY resolvable from inside
# Railway's private network, so we must use the container's local resolver,
# NOT public DNS. Without this exact line, the entrypoint script's sed
# replacement won't find a match.
resolver __RESOLVER_PLACEHOLDER__ ipv6=on valid=30s;

# ─── Magic-link bypass keys ───
# entrypoint.sh injects valid keys at boot from the VM2_PUBLIC_KEYS env
# var (comma-separated). Format: VM2_PUBLIC_KEYS=key1,key2,key3.
# Keep 1–3 keys active simultaneously to allow grace-period rotation.
#
# Two-stage check:
#   1. Prefer ?key=<value> from the URL if present
#   2. Fall back to the vm2_key cookie (set by the server when a key is
#      first seen, so users don't need to keep ?key= in every URL)
# If the resolved key is in the active list, $auth_realm becomes "off"
# (auth_basic is disabled). Otherwise it's the realm name (login prompt).
map $arg_key $effective_key {
    ""      $cookie_vm2_key;   # No query param — use the cookie
    default $arg_key;          # Query param wins if present
}
map $effective_key $auth_realm {
    default                  "VM2 Deliverables";
    # __VM2_PUBLIC_KEYS_BEGIN__
    # __VM2_PUBLIC_KEYS_END__
}

server {
    listen 8080;
    listen [::]:8080;
    server_name _;
    root /usr/share/nginx/html;
    index portal.html;

    auth_basic           $auth_realm;
    auth_basic_user_file /etc/nginx/.htpasswd;

    # When a magic key is in the URL, the cookie below pins auth-bypass
    # for the rest of the session (~7 days). Subsequent requests to
    # subpages, deliverables, project pages don't need ?key= appended.
    if ($arg_key) {
        add_header Set-Cookie "vm2_key=$arg_key; Path=/; Max-Age=604800; HttpOnly; SameSite=Lax";
    }

    # Redirect /index.html to /portal.html so old bookmarks work
    location = /index.html {
        return 302 /portal.html;
    }

    # /go — the share-link helper page. Always behind basic-auth.
    # Shows your active magic-link keys with copy buttons.
    location = /go {
        auth_basic           "VM2 Deliverables";
        auth_basic_user_file /etc/nginx/.htpasswd;
        try_files /go.html =404;
    }
    location = /go.html {
        auth_basic           "VM2 Deliverables";
        auth_basic_user_file /etc/nginx/.htpasswd;
    }

    # Todoist API proxy — avoids CORS for deep-dive button requests
    # Maps /api/todoist/* -> https://api.todoist.com/api/v1/*
    # Token is set server-side from env var — JS sends no auth headers
    # Overridden at runtime by entrypoint.sh if VM2_TODOIST_TOKEN env var is set
    set $todoist_token "0ac557ece28a1cd92b9635a8fbae56eec15887ad";
    location /api/todoist/ {
        auth_basic off;
        proxy_pass https://api.todoist.com/api/v1/;
        proxy_set_header Host api.todoist.com;
        proxy_set_header Accept "application/json";
        proxy_set_header Authorization "Bearer $todoist_token";
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_ssl_server_name on;
    }

    # VM2 Projects API — proxy to the FastAPI sidecar service.
    # The sidecar runs as a separate Railway service (vm2-projects-api).
    # On Railway, services in the same project reach each other via
    # <service-name>.railway.internal which resolves over IPv6.
    #
    # IMPORTANT: We use a hardcoded URL (not a variable) in proxy_pass
    # because nginx requires a resolver directive to use variables, and
    # Railway's internal DNS works best when nginx resolves at startup.
    # Use a variable for the upstream so nginx resolves it at request
    # time (via the resolver above) instead of at startup. Without this,
    # nginx caches the IP at boot and the connection fails.
    set $api_host "vm2-projects-api.railway.internal";
    set $api_port "8000";

    location /api/health {
        proxy_pass http://$api_host:$api_port;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /api/projects {
        proxy_pass http://$api_host:$api_port;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }
    location /api/deliverables {
        proxy_pass http://$api_host:$api_port;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # Cache static assets
    location ~* \.(css|js|png|jpg|gif|ico|svg|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript text/plain;
    gzip_min_length 256;
}
