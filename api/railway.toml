# Railway service config for VM2 Projects API.
# When you create a NEW Railway service from this repo and point it at
# api/Dockerfile, Railway picks this up automatically.

[build]
builder = "DOCKERFILE"
dockerfilePath = "api/Dockerfile"

[deploy]
startCommand = "/app/entrypoint.sh uvicorn projects_api:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# These env vars MUST be set in Railway dashboard for this service:
#   GITHUB_TOKEN     — PAT with repo scope (for git push)
#   GIT_USER_EMAIL   — vm2@changeis.com
#   GIT_USER_NAME    — VM2 Projects API
#
# Optional:
#   REPO_URL         — defaults to https://github.com/vm-coderock/VM2-P-Taskers.git
#   REPO_PATH        — defaults to /repo
#   PORT             — Railway sets this automatically
